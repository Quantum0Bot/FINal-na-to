                    <img id="carousel-img" src="" alt="">

                </div>

    <script>
        let weatherInterval;
        
        async function updateWeatherAndDate() {
            const now = new Date();
            const date = now.toLocaleDateString();
            const time = now.toLocaleTimeString();

            // Fetch real weather data from wttr.in for Manila, Philippines (no API key required)
            const city = 'Manila';
            const url = `https://wttr.in/${city}?format=j1`;

            try {
                const response = await fetch(url);
                const data = await response.json();
                const currentCondition = data.current_condition[0];
                const weatherDescription = currentCondition.weatherDesc[0].value;
                const temperature = Math.round(parseFloat(currentCondition.temp_C));
                const weather = `${weatherDescription.charAt(0).toUpperCase() + weatherDescription.slice(1)}, ${temperature}°C`;

                document.getElementById('weather-date').innerHTML = `
                    <div>Weather: ${weather}</div>
                    <div>Date: ${date}</div>
                    <div>Time: ${time}</div>
                `;
            } catch (error) {
                console.error('Error fetching weather data:', error);
                // Fallback to mock data
                const weather = "Clear, 25°C";
                document.getElementById('weather-date').innerHTML = `
                    <div>Weather: ${weather}</div>
                    <div>Date: ${date}</div>
                    <div>Time: ${time}</div>
                `;
            }
        }

        function startWeatherUpdate() {
            // Clear any existing content first to prevent duplicates
            const weatherEl = document.getElementById('weather-date');
            if (weatherEl) {
                weatherEl.innerHTML = '';
            }
            updateWeatherAndDate();
            weatherInterval = setInterval(updateWeatherAndDate, 1000);
        }
        
        function stopWeatherUpdate() {
            if (weatherInterval) {
                clearInterval(weatherInterval);
                weatherInterval = null;
            }
        }

        startWeatherUpdate();

        document.addEventListener('visibilitychange', function() {
            if (!document.hidden) {
                location.reload();
            }
        });

        window.addEventListener('focus', function() {
            location.reload();
        });
    </script>
